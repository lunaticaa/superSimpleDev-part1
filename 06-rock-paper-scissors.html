<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="const computerMove = computerPick()">Rock</button>
    <button onclick="const computerMove = computerPick()">Paper</button>
    <button onclick="const computerMove = computerPick()">Scissors</button>
    <script>
      let result = "";

      function computerPick() {
        // random number between 0 and 1
        const randNum = parseFloat(Math.random().toFixed(2));
        let computerMove = "";
        if (randNum >= 0 && randNum < 0.33) {
          computerMove = "Rock";
        } else if (randNum >= 0.34 && randNum < 0.66) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissors";
        }

        return computerMove;
      }
      // user pick
      function pickUp(pick) {
        computerPick();

        if (computerMove === pick) {
          result = "Tie";
        } else if (
          (computerMove === "Paper" && pick === "Rock") ||
          (computerMove === "Rock" && pick === "Scissors") ||
          (computerMove === "Scissors" && pick === "Paper")
        ) {
          result = "you lose!";
        } else {
          result = "you win!";
        }
        alert(
          ` you picked ${pick} Computer picked: ${computerMove}. ${result}`,
        );
      }
    </script>
  </body>
</html>
