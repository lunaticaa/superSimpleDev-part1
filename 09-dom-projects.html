<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOMs projects</title>
  </head>
  <body>
    <p>Youtube subscribe button</p>
    <button onclick="subscribe() " class="sub">Subscribe</button>
    <p>Amazon shipping Calculator</p>
    <input type="text" class="js-cost-input" placeholder="Cost of order" />
    <button onclick="">Calculate</button>
    <p class="js-total-cost"></p>

    <script>
      // calc button
      function Calculator() {
        const inputElement = document.querySelector(".js-cost-input");
        let cost = inputElement.value;
// 
        if (cost < 40) {
          cost += 10;
        }

        document.querySelector(".js-total-cost").innerHTML = `Total cost: ${cost}`;
      }
      // sub button
      function subscribe() {
        const btn1Element = document.querySelector(".sub");
        if (btn1Element.innerText === "Subscribe") {
          btn1Element.innerHTML = "Subscribed";
        } else {
          btn1Element.innerHTML = "Subscribe";
        }
      }
    </script>
  </body>
</html>
