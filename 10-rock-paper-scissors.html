<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="pickUp('rock')">Rock</button>
    <button onclick="pickUp('paper')">Paper</button>
    <button onclick="pickUp('scissors')">Scissors</button>
    <!-- show results -->
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <!-- end of show results -->
    <button
      onclick="score.wins = 0;
    score.losses = 0;
    score.ties = 0
    localStorage.removeItem('score')
    updateScoreElement()"
    >
      Reset Score
    </button>
    <script>
      const score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      updateScoreElement();

      /*
      if (!score) {
        score = {
          wins: 0,
          losses: 0,
          ties: 0,
        };
      }
        */
      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }
      function computerPick() {
        // random number between 0 and 1
        const randNum = parseFloat(Math.random().toFixed(2));
        let computerMove = "";
        if (randNum >= 0 && randNum < 0.33) {
          computerMove = "rock";
        } else if (randNum >= 0.34 && randNum < 0.66) {
          computerMove = "paper";
        } else {
          computerMove = "scissors";
        }

        return computerMove;
      }
      // user pick
      function pickUp(pick) {
        let result = "";
        const computerMove = computerPick();

        if (pick == "scissors") {
          if (computerMove == "rock") {
            result = "You lose!";
          } else if (computerMove == "paper") {
            result = "You win!";
          } else if (computerMove == "scissors") {
            result = "It's a tie!";
          }
        } else if (pick == "paper") {
          if (computerMove == "rock") {
            result = "You win!";
          } else if (computerMove == "paper") {
            result = "It's a tie!";
          } else if (computerMove == "scissors") {
            result = "You lose!";
          }
        } else if (pick == "rock") {
          if (computerMove == "rock") {
            result = "It's a tie!";
          } else if (computerMove == "paper") {
            result = "You lose!";
          } else if (computerMove == "scissors") {
            result = "You win!";
          }
        }

        if (result === "You win!") {
          score.wins += 1;
        } else if (result === "You lose!") {
          score.losses += 1;
        } else if (result === "It's a tie!") {
          score.ties += 1;
        }
        localStorage.setItem("score", JSON.stringify(score));

        updateScoreElement();
        document.querySelector(".js-result").innerHTML = result;
        document.querySelector(".js-moves").innerHTML =
          `You: ${pick} - Computer: ${computerMove}`;
      }
    </script>
  </body>
</html>
