<html lang="en">
  <head>

    <title>Booleans</title>
  </head>
  <body>
    <script>
      // boolean value = true & false
      // false
      console.log(3 > 5);
      // true
      console.log(3 < 5);
      console.log(typeof true);

      if (true) {
        console.log("fuck off");
      }
    </script>
  </body>
